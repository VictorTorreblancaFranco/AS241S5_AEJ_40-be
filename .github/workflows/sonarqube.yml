name: SonarQube Analysis - Backend

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  sonarqube:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
          
      - name: Set environment variables
        run: |
          echo "RAPIDAPI_KEY=${{ secrets.RAPIDAPI_KEY }}" >> $GITHUB_ENV
          echo "RAPIDAPI_TEXTTOIMAGE_URL=${{ secrets.RAPIDAPI_TEXTTOIMAGE_URL }}" >> $GITHUB_ENV
          echo "RAPIDAPI_TEXTTOIMAGE_HOST=${{ secrets.RAPIDAPI_TEXTTOIMAGE_HOST }}" >> $GITHUB_ENV
          echo "RAPIDAPI_INSTAGRAM_URL=${{ secrets.RAPIDAPI_INSTAGRAM_URL }}" >> $GITHUB_ENV
          echo "RAPIDAPI_INSTAGRAM_HOST=${{ secrets.RAPIDAPI_INSTAGRAM_HOST }}" >> $GITHUB_ENV
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> $GITHUB_ENV
          
      - name: Build and analyze
        run: |
          mvn clean verify sonar:sonar \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.organization=victortorreblancafranco \
            -Dsonar.projectKey=victortorreblancafranco_AS241S5_AEJ_40-be \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}
