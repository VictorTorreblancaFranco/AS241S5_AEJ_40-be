name: Docker Hub - Backend

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN_40 }}" | docker login -u "${{ secrets.DOCKERHUB_VICTORTORREBLANCA_40 }}" --password-stdin

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_VICTORTORREBLANCA_40 }}/as241s5_aej_40-be:latest
            ${{ secrets.DOCKERHUB_VICTORTORREBLANCA_40 }}/as241s5_aej_40-be:${{ github.sha }}
