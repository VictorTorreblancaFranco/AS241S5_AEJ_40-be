name: Docker Hub - Backend

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_40 }}
          password: ${{ secrets.DOCKERHUB_TOKEN_40 }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME_40 }}/as241s5_aej_40-be:latest
            ${{ secrets.DOCKERHUB_USERNAME_40 }}/as241s5_aej_40-be:${{ github.sha }}
