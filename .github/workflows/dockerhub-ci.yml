name: Docker Hub - Backend

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_VICTORTORREBLANCA_40 }}
          password: ${{ secrets.DOCKERHUB_TOKEN_40 }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_VICTORTORREBLANCA_40 }}/as241s5_aej_40-be:latest .
          docker images

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKERHUB_VICTORTORREBLANCA_40 }}/as241s5_aej_40-be:latest
